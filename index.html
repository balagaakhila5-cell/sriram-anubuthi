<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anubuthi III</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="page">
      <header class="top-header">
        <div class="logo-row">
          <img
            src="./assets/logos-40-years 1.png"
            alt="40 Years Icon"
            class="years-logo"
          />
          <img
            src="./assets/SRIRAM's-IAS.png"
            alt="Sriram IAS Logo"
            class="main-logo"
          />
        </div>
      </header>

      <section class="banner-section">
        <img
          src="./assets/ANUBHUTI-III-Banner.JPG.jpeg"
          alt="Banner"
          class="banner-image"
        />
      </section>

      <section class="content-section">
        <div class="left-content">
          <h1 class="title">ANUBUTHI III</h1>
          <p class="subtitle">All India Open Mock Test 2026</p>
          <p class="tagline">
            <span class="blue-text">TEST</span>
            <span class="dot">.</span>
            <span class="gray-text">RANK</span>
            <span class="dot">.</span>
            <span class="pink-text">RISE</span>
          </p>

          <div class="exam-card">
            <p class="exam-label">Examination Date</p>
            <p class="exam-date">April 18th Saturday , 2026</p>
          </div>
        </div>

        <div class="right-content">
          <div class="login-card">
            <h2 class="card-title">CANDIDATE DETAILS</h2>

            <label for="mobileNumber" class="input-label">MOBILE NUMBER</label>

            <div class="input-wrapper">
              <span class="input-icon">📱</span>
              <input
                type="text"
                id="mobileNumber"
                maxlength="10"
                placeholder="Register 10 - Digit Mobile Number"
                autocomplete="off"
              />
            </div>

            <p id="errorMessage" class="error-message"></p>

            <button id="loginBtn" class="login-btn">Login →</button>

            <p class="assistance-text">
              <span class="assist-icon">🎧</span>
              For any Assistance call <span>9811489560</span>
            </p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
